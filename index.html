<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alerty · Panel de administración</title>
<style>
  :root { --azul:#1F8CFF; --morado:#6A28E0; --primary:#4A47E6; }
  * { box-sizing:border-box; font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif; }
  body { margin:0; background:#F3F5FF; color:#101020; }
  header { background:linear-gradient(135deg,var(--azul),var(--morado)); color:#fff; padding:22px 28px; }
  header h1 { margin:0; font-size:26px; }
  header p { margin:4px 0 0; opacity:.9; }
  .wrap { max-width:980px; margin:0 auto; padding:20px; }
  .card { background:#fff; border-radius:16px; padding:20px; margin-bottom:18px; box-shadow:0 2px 10px rgba(0,0,0,.06); }
  .card h2 { margin:0 0 14px; font-size:18px; }
  label { display:block; font-size:13px; color:#555; margin:10px 0 4px; }
  input { width:100%; padding:11px 12px; border:1px solid #d4d8e8; border-radius:10px; font-size:15px; }
  button { background:var(--primary); color:#fff; border:0; border-radius:10px; padding:10px 15px; font-size:14px; cursor:pointer; }
  button.ghost { background:#eef0fb; color:var(--primary); }
  button.danger { background:#fde8e8; color:#c62828; }
  .row { display:flex; gap:10px; flex-wrap:wrap; }
  .row > div { flex:1; min-width:160px; }
  table { width:100%; border-collapse:collapse; margin-top:8px; }
  th,td { text-align:left; padding:10px 8px; border-bottom:1px solid #eef; font-size:14px; }
  .pill { padding:3px 10px; border-radius:999px; font-size:12px; font-weight:600; white-space:nowrap; }
  .ok { background:#e6f4ea; color:#1e7e34; }
  .susp { background:#fdecea; color:#c62828; }
  .d-ok { background:#e6f4ea; color:#1e7e34; }
  .d-soon { background:#fff4e5; color:#b26a00; }
  .d-bad { background:#fdecea; color:#c62828; }
  .warn { background:#fff7e6; border:1px solid #ffd591; padding:10px 14px; border-radius:10px; font-size:13px; color:#8a6d3b; }
  .msg { margin-top:10px; font-size:14px; }
  .err { color:#c62828; } .good { color:#1e7e34; }
  .acts { display:flex; gap:6px; flex-wrap:wrap; }
  .summary { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:6px; }
  .chip { background:#f1f3ff; border-radius:12px; padding:10px 14px; font-size:14px; }
  .chip b { font-size:18px; display:block; }
</style>
</head>
<body>
<header>
  <h1>Alerty · Panel de administración</h1>
  <p>Crea dueños y administra sus suscripciones y vencimientos</p>
</header>

<div class="wrap">

  <div class="card">
    <h2>Conexión</h2>
    <div class="warn">⚠️ La <b>service_role key</b> es tu llave maestra. No se guarda: la escribes cada vez. No la subas a internet.</div>
    <label>Project URL</label>
    <input id="url" value="https://iehfuzzfieawkpoehkru.supabase.co">
    <label>service_role key</label>
    <input id="key" type="password" placeholder="Pega aquí la service_role key (NO la anon)">
  </div>

  <div class="card">
    <h2>Crear dueño</h2>
    <div class="row">
      <div><label>Negocio (handle, único)</label><input id="c_handle" placeholder="bodega-bertha"></div>
      <div><label>Nombre visible</label><input id="c_nombre" placeholder="Bodega Bertha"></div>
    </div>
    <div class="row">
      <div><label>Correo (usuario)</label><input id="c_correo" placeholder="dueno@correo.com"></div>
      <div><label>Contraseña</label><input id="c_pass" placeholder="contraseña"></div>
    </div>
    <div class="row">
      <div><label>Vence el</label><input id="c_vence" type="date"></div>
      <div><label>Máx. trabajadores</label><input id="c_max" type="number" value="5"></div>
    </div>
    <br>
    <button onclick="crearDueno()">Crear dueño</button>
    <div id="c_msg" class="msg"></div>
  </div>

  <div class="card">
    <h2>Negocios <button class="ghost" style="float:right" onclick="cargar()">Recargar</button></h2>
    <div id="resumen" class="summary"></div>
    <div id="lista">Pulsa “Recargar” para ver los negocios.</div>
  </div>

</div>

<script>
const $ = id => document.getElementById(id);
function H() {
  const k = $('key').value.trim();
  return { apikey:k, Authorization:'Bearer '+k, 'Content-Type':'application/json' };
}
function base() { return $('url').value.trim().replace(/\/$/,''); }

function diasRestantes(vence) {
  if (!vence) return null;
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const v = new Date(vence + 'T00:00:00');
  return Math.round((v - hoy) / 86400000);
}

async function crearDueno() {
  const msg = $('c_msg'); msg.textContent = 'Creando...'; msg.className='msg';
  try {
    const correo = $('c_correo').value.trim();
    const pass = $('c_pass').value;
    const handle = $('c_handle').value.trim().toLowerCase();
    const nombre = $('c_nombre').value.trim();
    const vence = $('c_vence').value;
    const max = parseInt($('c_max').value || '5', 10);
    if (!correo || !pass || !handle || !vence) throw new Error('Completa correo, contraseña, negocio y vencimiento.');

    let r = await fetch(base()+'/auth/v1/admin/users', {
      method:'POST', headers:H(),
      body: JSON.stringify({ email:correo, password:pass, email_confirm:true })
    });
    let u = await r.json();
    if (!r.ok) throw new Error('Auth: '+(u.msg||u.error_description||JSON.stringify(u)));
    const uid = u.id;

    r = await fetch(base()+'/rest/v1/negocios', {
      method:'POST', headers:{...H(), Prefer:'return=representation'},
      body: JSON.stringify({ handle, nombre, owner_user_id:uid, estado:'active', vence_el:vence, max_trabajadores:max })
    });
    let neg = await r.json();
    if (!r.ok) throw new Error('Negocio: '+JSON.stringify(neg));
    const negId = neg[0].id;

    r = await fetch(base()+'/rest/v1/perfiles', {
      method:'POST', headers:H(),
      body: JSON.stringify({ user_id:uid, negocio_id:negId, rol:'owner', nombre_visible:nombre||handle })
    });
    if (!r.ok) throw new Error('Perfil: '+JSON.stringify(await r.json()));

    msg.textContent = '✓ Dueño creado: '+handle; msg.className='msg good';
    cargar();
  } catch(e) {
    msg.textContent = '✗ '+e.message; msg.className='msg err';
  }
}

async function cargar() {
  const cont = $('lista'); cont.textContent = 'Cargando...'; $('resumen').innerHTML='';
  try {
    const r = await fetch(base()+'/rest/v1/negocios?select=*', { headers:H() });
    let data = await r.json();
    if (!r.ok) throw new Error(JSON.stringify(data));
    if (!data.length) { cont.textContent = 'No hay negocios todavía.'; return; }

    // Ordenar por vencimiento más cercano primero.
    data.sort((a,b) => (a.vence_el||'9999') < (b.vence_el||'9999') ? -1 : 1);

    // Resumen.
    let activos=0, porVencer=0, vencidos=0;
    for (const n of data) {
      const d = diasRestantes(n.vence_el);
      if (n.estado==='active') activos++;
      if (d!==null && d < 0) vencidos++;
      else if (d!==null && d <= 7) porVencer++;
    }
    $('resumen').innerHTML =
      `<div class="chip"><b>${data.length}</b>negocios</div>
       <div class="chip"><b>${activos}</b>activos</div>
       <div class="chip"><b>${porVencer}</b>vencen ≤ 7 días</div>
       <div class="chip"><b>${vencidos}</b>vencidos</div>`;

    let html = '<table><tr><th>Negocio</th><th>Nombre</th><th>Estado</th><th>Vence</th><th>Días</th><th>Acciones</th></tr>';
    for (const n of data) {
      const estadoPill = n.estado==='active' ? '<span class="pill ok">activo</span>' : '<span class="pill susp">suspendido</span>';
      const d = diasRestantes(n.vence_el);
      let diasPill = '<span class="pill">—</span>';
      if (d!==null) {
        const cls = d < 0 ? 'd-bad' : (d <= 7 ? 'd-soon' : 'd-ok');
        const txt = d < 0 ? `vencido hace ${-d} d` : (d===0 ? 'vence hoy' : `${d} días`);
        diasPill = `<span class="pill ${cls}">${txt}</span>`;
      }
      html += `<tr>
        <td><b>${n.handle}</b></td>
        <td>${n.nombre||''}</td>
        <td>${estadoPill}</td>
        <td>${n.vence_el||''}</td>
        <td>${diasPill}</td>
        <td><div class="acts">
          <button class="ghost" onclick="renovar('${n.id}','${n.vence_el||''}')">Renovar</button>
          <button class="ghost" onclick="toggle('${n.id}','${n.estado}')">${n.estado==='active'?'Suspender':'Activar'}</button>
          <button class="danger" onclick="borrar('${n.id}','${n.owner_user_id}','${n.handle}')">Eliminar</button>
        </div></td>
      </tr>`;
    }
    html += '</table>';
    cont.innerHTML = html;
  } catch(e) { cont.innerHTML = '<span class="err">Error: '+e.message+'</span>'; }
}

async function patch(id, body) {
  const r = await fetch(base()+'/rest/v1/negocios?id=eq.'+id, { method:'PATCH', headers:H(), body:JSON.stringify(body) });
  if (!r.ok) alert('Error: '+JSON.stringify(await r.json())); else cargar();
}
function toggle(id, estado) { patch(id, { estado: estado==='active'?'suspended':'active' }); }
function renovar(id, actual) {
  // Sugerir un mes más desde hoy.
  const base = new Date(); base.setMonth(base.getMonth()+1);
  const sug = base.toISOString().slice(0,10);
  const v = prompt('Nueva fecha de vencimiento (AAAA-MM-DD):', sug);
  if (v) patch(id, { vence_el: v, estado:'active' });
}
async function borrar(id, ownerUid, handle) {
  if (!confirm('¿Eliminar el negocio "'+handle+'" y su dueño? Esto borra todo (trabajadores, pagos).')) return;
  const r = await fetch(base()+'/auth/v1/admin/users/'+ownerUid, { method:'DELETE', headers:H() });
  if (!r.ok) alert('Error: '+JSON.stringify(await r.json())); else cargar();
}
</script>
</body>
</html>
